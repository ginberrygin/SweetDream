<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="sweet.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn-icons-png.flaticon.com/512/5531/5531419.png"
    />
    <!-- Boxicon -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- The header section contain the logo and navigation -->

    <header class="header">
      <!-- Generated by https://smooth.ie/blogs/news/svg-wavey-transitions-between-sections -->

      <div style="height: 150px; overflow: hidden">
        <svg
          viewBox="0 0 500 150"
          preserveAspectRatio="none"
          style="height: 100%; width: 100%"
        >
          <path
            d="M-2.44,49.29 C177.57,93.09 349.20,-50.10 562.45,59.25 L495.30,-2.47 L-1.88,-9.44 Z"
            style="stroke: none; fill: #c89b3c"
          ></path>
        </svg>
      </div>

      <div class="container">
        <div class="header__bar">
          <img
            src="img/sweetdreamlogo.jpg"
            alt="sweetdreamx"
            class="header__logo"
          />
          <!-- <i class="bx bx-menu bx-md" style="color: whitesmoke" id="menu"></i> -->
          <nav>
            <ul class="header__main_navigation" id="nav-links">
              <li><a href="#">Home</a></li>
              <li><a href="#">About Us</a></li>
              <li><a href="#">Catalog</a></li>
              <li><a href="#">Contact Us</a></li>
            </ul>
          </nav>
        </div>
        <div class="header__box">
          <div class="header__text-box">
            <h1>Sweet Dream Venture</h1>
            <h2>Bringing Fashion Displays to Life</h2>
          </div>
          <div class="header__btn">
            <a class="btn" href="#">Get a Quote Today!</a>
          </div>
        </div>
      </div>
    </header>

    <!-- End of the header section -->
    <!-- ================================================================= -->

    <div class="section-catalog">
      <div style="height: 150px; overflow: hidden">
        <svg
          viewBox="0 0 500 150"
          preserveAspectRatio="none"
          style="height: 100%; width: 100%"
        >
          <path
            d="M-2.44,49.29 C177.57,93.09 349.20,-50.10 562.45,59.25 L495.30,-2.47 L-1.88,-9.44 Z"
            style="stroke: none; fill: black"
          ></path>
        </svg>
      </div>
      <div class="container">
        <div class="section-header">
          <h2>Our Catalog</h2>
          <h1>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem,
            molestiae.
          </h1>
        </div>
      </div>
    </div>
  </body>
  <script src="sweet.js"></script>
</html>
